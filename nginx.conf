worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    server {
        listen 8086;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        charset utf-8;
        client_max_body_size 10m;

        # 보안 헤더
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 정적 파일 캐싱 (CSS, JS, 폰트, 이미지)
        location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # HTML 파일은 캐시하지 않음 (항상 최신 버전 서빙)
        location ~* \.html$ {
            add_header Cache-Control "no-cache";
        }

        # sitemap, robots.txt, rss
        location ~* (sitemap.*\.xml|robots\.txt|rss\.xml)$ {
            expires 1d;
            add_header Cache-Control "public";
        }

        # 업로드된 이미지
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            expires 30d;
            add_header Cache-Control "public";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # API 프록시
        location /api/ {
            proxy_pass http://api:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Astro 정적 빌드 - 각 경로에 대해 index.html 서빙
        location / {
            try_files $uri $uri/index.html $uri.html =404;
        }

        # 404 페이지
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
